name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install

      - name: Install global tools
        run: npm install -g tsx

      - name: Build web app (Vite)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Generate Android icons from master image
        run: |
          pip install pillow -q
          curl -L "https://economydino.com/icon-master.png" -o /tmp/icon_master.png
          python3 - <<'EOF'
          from PIL import Image
          import os

          src = Image.open("/tmp/icon_master.png").convert("RGBA")
          base = "android/app/src/main/res"
          sizes = {
            "mipmap-mdpi": 48,
            "mipmap-hdpi": 72,
            "mipmap-xhdpi": 96,
            "mipmap-xxhdpi": 144,
            "mipmap-xxxhdpi": 192,
          }
          for folder, size in sizes.items():
            d = f"{base}/{folder}"
            os.makedirs(d, exist_ok=True)
            img = src.resize((size, size), Image.LANCZOS)
            img.save(f"{d}/ic_launcher.png")
            img.save(f"{d}/ic_launcher_round.png")
            fg = int(size * 108 / 72)
            fg_img = src.resize((fg, fg), Image.LANCZOS)
            fg_img.save(f"{d}/ic_launcher_foreground.png")
            print(f"✅ {folder} ({size}px)")
          EOF

      - name: Sync Capacitor with Android
        run: ./node_modules/.bin/cap sync android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/dinoinvest.keystore
          jarsigner -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore /tmp/dinoinvest.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            android/app/build/outputs/apk/release/app-release-unsigned.apk \
            "${{ secrets.KEY_ALIAS }}"
          ZIPALIGN=$(find $ANDROID_SDK_ROOT/build-tools -name "zipalign" | sort -r | head -1)
          $ZIPALIGN -v 4 \
            android/app/build/outputs/apk/release/app-release-unsigned.apk \
            android/app/build/outputs/apk/release/DinoInvest-signed.apk

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: DinoInvest-signed-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/DinoInvest-signed.apk
          retention-days: 30
