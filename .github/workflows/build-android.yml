name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install global tools
        run: npm install -g tsx

      - name: Build web app (Vite)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Generate Android icons from master image
        run: |
          sudo apt-get install -y imagemagick
          curl -L "https://economydino.com/icon-master.png" -o /tmp/icon_master.png
          BASE="android/app/src/main/res"
          declare -A SIZES=( [mipmap-mdpi]=48 [mipmap-hdpi]=72 [mipmap-xhdpi]=96 [mipmap-xxhdpi]=144 [mipmap-xxxhdpi]=192 )
          for FOLDER in "${!SIZES[@]}"; do
            SIZE=${SIZES[$FOLDER]}
            DIR="$BASE/$FOLDER"
            convert /tmp/icon_master.png -resize "${SIZE}x${SIZE}!" "$DIR/ic_launcher.png"
            convert /tmp/icon_master.png -resize "${SIZE}x${SIZE}!" "$DIR/ic_launcher_round.png"
            FG=$((SIZE * 108 / 72))
            convert /tmp/icon_master.png -resize "${FG}x${FG}" -gravity center -background none -extent "${FG}x${FG}" "$DIR/ic_launcher_foreground.png"
            echo "✅ $FOLDER (${SIZE}px)"
          done

      - name: Sync Capacitor with Android
        run: npx cap sync android

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DinoInvest-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build release APK (unsigned)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        continue-on-error: true

      - name: Upload release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: DinoInvest-release-unsigned-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
