name: Build Android APK + AAB

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK + AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install

      - name: Install global tools
        run: |
          npm install -g tsx
          npm install -g @capacitor/cli

      - name: Build web app (Vite)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Generate Android icons from master image
        run: |
          sudo apt-get install -y imagemagick
          SRC="https://economydino.com/icon-master.png"
          curl -L "$SRC" -o /tmp/icon_master.png
          BASE="android/app/src/main/res"
          declare -A SIZES=( [mipmap-mdpi]=48 [mipmap-hdpi]=72 [mipmap-xhdpi]=96 [mipmap-xxhdpi]=144 [mipmap-xxxhdpi]=192 )
          for FOLDER in "${!SIZES[@]}"; do
            SIZE=${SIZES[$FOLDER]}
            DIR="$BASE/$FOLDER"
            convert /tmp/icon_master.png -resize "${SIZE}x${SIZE}!" "$DIR/ic_launcher.png"
            convert /tmp/icon_master.png -resize "${SIZE}x${SIZE}!" \
              \( +clone -threshold 100% -negate \
                 -fill white -draw "circle $((SIZE/2)),$((SIZE/2)) $((SIZE/2)),0" \) \
              -alpha off -compose CopyOpacity -composite \
              "$DIR/ic_launcher_round.png"
            FG=$((SIZE * 108 / 72))
            convert /tmp/icon_master.png -resize "${SIZE}x${SIZE}" -gravity center -background none \
              -extent "${FG}x${FG}" "$DIR/ic_launcher_foreground.png"
            echo "✅ $FOLDER (${SIZE}px)"
          done

      - name: Sync Capacitor with Android
        run: cap sync android

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > $RUNNER_TEMP/release.keystore
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> $GITHUB_ENV

      - name: Build signed AAB
        working-directory: android
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: DinoInvest-AAB-signed-${{ github.run_number }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Build signed APK
        working-directory: android
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: DinoInvest-APK-signed-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DinoInvest-APK-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
