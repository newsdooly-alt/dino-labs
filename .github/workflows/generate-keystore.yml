name: Generate Keystore (run once only)
on:
  workflow_dispatch:
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Generate keystore and print base64
        run: |
          keytool -genkey -v \
            -keystore dinoinvest.keystore \
            -alias dinoinvest \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=DinoInvest,O=DinoInvest,C=KR" \
            -storepass dinoinvest2024 -keypass dinoinvest2024
          echo "=== COPY THIS BASE64 ==="
          base64 -w 0 dinoinvest.keystore
          echo ""
          echo "========================"
